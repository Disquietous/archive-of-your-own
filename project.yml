name: ArchiveOfYourOwn
options:
  bundleIdPrefix: com.archiveofyourown
  deploymentTarget:
    iOS: "18.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  ArchiveOfYourOwn:
    type: application
    platform: iOS
    sources:
      - path: apps/ios
      - path: packages/AO3Kit/Sources
    dependencies:
      - framework: AO3Core.xcframework
        embed: false
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_BUNDLE_IDENTIFIER: com.archiveofyourown.reader
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: apps/ios/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        OTHER_SWIFT_FLAGS:
          - "-Xcc"
          - "-fmodule-map-file=$(SRCROOT)/packages/AO3Kit/Sources/Generated/ao3_coreFFI.modulemap"
        OTHER_LDFLAGS:
          - "-lz"
          - "-lresolv"
          - "-llzma"

  ArchiveOfYourOwnMac:
    type: application
    platform: macOS
    sources:
      - path: apps/macos
      - path: packages/AO3Kit/Sources
      - path: apps/ios/Resources/Fonts
        type: folder
    dependencies:
      - framework: AO3Core.xcframework
        embed: false
    settings:
      base:
        PRODUCT_NAME: AoYO
        PRODUCT_BUNDLE_IDENTIFIER: com.archiveofyourown.reader.mac
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: apps/macos/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: P9P8PPRUHR
        OTHER_SWIFT_FLAGS:
          - "-Xcc"
          - "-fmodule-map-file=$(SRCROOT)/packages/AO3Kit/Sources/Generated/ao3_coreFFI.modulemap"
        OTHER_LDFLAGS:
          - "-lz"
          - "-lresolv"
          - "-llzma"
