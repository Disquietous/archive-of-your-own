name: ArchiveOfYourOwn
options:
  bundleIdPrefix: com.archiveofyourown
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_FILE: ArchiveOfYourOwn/Resources/Info.plist

targets:
  ArchiveOfYourOwn:
    type: application
    platform: iOS
    sources:
      - path: ArchiveOfYourOwn
    dependencies:
      - framework: AO3Core.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.archiveofyourown.reader
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: ArchiveOfYourOwn/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        OTHER_SWIFT_FLAGS:
          - "-Xcc"
          - "-fmodule-map-file=$(SRCROOT)/ArchiveOfYourOwn/Generated/ao3_coreFFI.modulemap"
        OTHER_LDFLAGS:
          - "-lz"
          - "-lresolv"
